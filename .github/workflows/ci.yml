name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Core promise: the light install (no TensorFlow) passes the suite.
      - name: Install (light core + server)
        run: pip install -e ".[dev,server]" httpx
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -q --cov=fitchip --cov-report=term-missing

  smoke-real-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Compile micro-speech for every builtin target
        run: |
          fitchip samples pull micro-speech
          for t in esp32 esp32s3 esp32c3; do
            fitchip compile micro-speech.tflite --target "$t" --quantize int8 --out "out-$t"
            test -f "out-$t/$t-project/main/main.cc"
          done
